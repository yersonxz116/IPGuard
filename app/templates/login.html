<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Iniciar sesión en IPGuard - Panel de monitoreo de cámaras IP.">
    <title>IPGuard - Iniciar Sesion</title>
    <link rel="stylesheet" href="{{ asset_url('css/icons.min.css') }}">
    <link rel="stylesheet" href="{{ asset_url('css/login.min.css') }}">
</head>
<body class="auth-page">
    <div class="auth-layout">
        <!-- Left Panel - Branding -->
        <aside class="auth-panel">
            <div class="auth-panel-content">
                <a href="{{ url_for('index') }}" class="auth-logo" aria-label="Volver al inicio">
                    <img src="{{ asset_url('assets/image/logo.jpeg') }}" alt="IPGuard Logo" width="44" height="44">
                    <span>IP<span>Guard</span></span>
                </a>
                <div class="auth-panel-hero">
                    <h2>Monitoreo inteligente para tu hogar</h2>
                    <p>Detección de personas en tiempo real con notificaciones automáticas.</p>
                </div>
                <div class="auth-panel-features">
                    <div class="auth-feature">
                        <i class="fas fa-shield-halved"></i>
                        <span>Seguridad 24/7</span>
                    </div>
                    <div class="auth-feature">
                        <i class="fas fa-bell"></i>
                        <span>Alertas instantáneas</span>
                    </div>
                    <div class="auth-feature">
                        <i class="fas fa-eye"></i>
                        <span>IA en tiempo real</span>
                    </div>
                </div>
            </div>
            <div class="auth-panel-bg"></div>
        </aside>

        <!-- Right Panel - Form -->
        <main class="auth-main">
            <section class="auth-card" aria-label="Formulario de inicio de sesion">
                <div class="auth-card-header">
                    <h1>Bienvenido de vuelta</h1>
                    <p>Ingresa tus credenciales para acceder al panel.</p>
                </div>

                <form id="loginForm" class="auth-form" novalidate>
                    <div class="form-group">
                        <label for="username">Usuario o email</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user"></i>
                            <input
                                type="text"
                                id="username"
                                name="username"
                                placeholder="tu.usuario"
                                required
                                autocomplete="username"
                            >
                        </div>
                        <span class="error-message" id="usernameError"></span>
                    </div>

                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input
                                type="password"
                                id="password"
                                name="password"
                                placeholder="Tu contraseña"
                                required
                                autocomplete="current-password"
                            >
                            <button type="button" class="toggle-password" id="togglePassword" aria-label="Mostrar contraseña">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <span class="error-message" id="passwordError"></span>
                    </div>

                    <div class="form-row">
                        <label class="checkbox-label">
                            <input type="checkbox" id="remember" name="remember">
                            <span class="checkmark"></span>
                            Recordarme
                        </label>
                        <a href="#" class="subtle-link">Recuperar acceso</a>
                    </div>

                    <div class="alert alert-error" id="loginError" style="display: none;">
                        <i class="fas fa-triangle-exclamation"></i>
                        <span id="errorText"></span>
                    </div>

                    <button type="submit" class="btn-submit" id="loginBtn">
                        <span class="btn-text">Iniciar sesión</span>
                        <span class="btn-loader" style="display: none;">
                            <i class="fas fa-spinner fa-spin"></i>
                        </span>
                    </button>
                </form>

                <div class="auth-switch">
                    <span>¿No tienes cuenta?</span>
                    <a href="{{ url_for('register') }}">Crear cuenta</a>
                </div>
            </section>
        </main>
    </div>

    <script src="{{ asset_url('js/login.js') }}" defer></script>
</body>
</html>
