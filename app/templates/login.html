<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPGuard - Iniciar Sesion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body class="auth-page auth-login">
    <video class="video-bg auth-video" muted playsinline loop autoplay>
        <source src="{{ url_for('static', filename='assets/video/city.mp4') }}" type="video/mp4">
    </video>
    <div class="auth-overlay"></div>

    <main class="auth-shell auth-shell--narrow">
        <section class="auth-card" aria-label="Formulario de inicio de sesion">
            <a href="{{ url_for('index') }}" class="auth-brand" aria-label="Volver al inicio">
                <img src="{{ url_for('static', filename='assets/image/logo.jpeg') }}" alt="IPGuard Logo">
                <span>IP<span>Guard</span></span>
            </a>

            <div class="auth-art">
                <img src="{{ url_for('static', filename='assets/image/login-auth.png') }}" alt="Panel de monitoreo IPGuard">
            </div>

            <div class="auth-card-header">
                <h1>Iniciar sesion</h1>
                <p>Accede al panel de monitoreo.</p>
            </div>

            <form id="loginForm" class="auth-form" novalidate>
                <div class="form-group">
                    <label for="username">Usuario o email</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="juan.perez"
                        required
                        autocomplete="username"
                    >
                    <span class="error-message" id="usernameError"></span>
                </div>

                <div class="form-group">
                    <label for="password">Contrasena</label>
                    <div class="password-wrapper">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Tu contrasena"
                            required
                            autocomplete="current-password"
                        >
                        <button type="button" class="toggle-password" id="togglePassword" aria-label="Mostrar contrasena">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <div class="form-row">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember" name="remember">
                        <span class="checkmark"></span>
                        Recordarme
                    </label>
                    <a href="#" class="subtle-link">Recuperar acceso</a>
                </div>

                <div class="alert alert-error" id="loginError" style="display: none;">
                    <i class="fas fa-triangle-exclamation"></i>
                    <span id="errorText"></span>
                </div>

                <button type="submit" class="btn btn-login" id="loginBtn">
                    <span class="btn-text">Entrar</span>
                    <span class="btn-loader" style="display: none;">
                        <i class="fas fa-spinner fa-spin"></i>
                    </span>
                </button>
            </form>

            <div class="auth-switch">
                <span>No tienes cuenta?</span>
                <a href="{{ url_for('register') }}">Crear cuenta</a>
            </div>
        </section>
    </main>

    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
